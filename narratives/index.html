<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Action Narrative</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none; /* Disable default browser double-tap/pinch zoom */
    }
    #comic-img {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <img id="comic-img" src="" alt="Comic Page">

  <script>
    // List of images
    var images = ['ChatGPT Image Jun 22, 2026, 12_36_51 PM (1).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_51 PM (2).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_52 PM (3).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_52 PM (4).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_53 PM (5).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_53 PM (6).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_53 PM (7).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_54 PM (8).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_54 PM (9).jpg', 'ChatGPT Image Jun 22, 2026, 12_36_55 PM (10).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_50 AM (1).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_51 AM (2).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_51 AM (3).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_52 AM (4).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_52 AM (5).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_54 AM (6).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_54 AM (7).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_55 AM (8).jpg', 'ChatGPT Image Jun 23, 2026, 11_11_56 AM (9).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_29 AM (1).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_30 AM (2).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_30 AM (3).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_31 AM (4).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_31 AM (5).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_33 AM (7).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_35 AM (8).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_37 AM (10).jpg', 'ChatGPT Image Jun 23, 2026, 11_31_53 AM.jpg', 'ChatGPT Image Jun 23, 2026, 12_01_41 PM.jpg', 'ChatGPT Image Jun 25, 2026, 03_27_56 PM (1).jpg', 'ChatGPT Image Jun 25, 2026, 03_27_56 PM (2).jpg', 'ChatGPT Image Jun 25, 2026, 03_27_57 PM (3).jpg', 'ChatGPT Image Jun 25, 2026, 03_27_57 PM (4).jpg', 'ChatGPT Image Jun 25, 2026, 03_27_58 PM (5).jpg', 'ChatGPT Image Jun 25, 2026, 03_27_58 PM (6).jpg', 'ChatGPT Image Jun 25, 2026, 03_27_59 PM (7).jpg', 'ChatGPT Image Jun 25, 2026, 03_28_00 PM (8).jpg', 'ChatGPT Image Jun 25, 2026, 03_28_00 PM (9).jpg', 'ChatGPT Image Jun 25, 2026, 03_28_01 PM (10).jpg'];

    // Select a random image
    var randomImage = images[Math.floor(Math.random() * images.length)];
    var img = document.getElementById("comic-img");
    img.src = randomImage;

    // PINCH TO ZOOM & PAN LOGIC (纯JS实现，在全屏模式下依然完美缩放与拖拽)
    var scale = 1;
    var posX = 0, posY = 0;
    
    var initDist = 0;
    var initMidX = 0, initMidY = 0;
    var baseScale = 1;
    var basePosX = 0, basePosY = 0;
    var startX = 0, startY = 0;
    var activeTouch = false;
    var isPinching = false;
    
    // Tap-to-fullscreen detection
    var touchStartTime = 0;
    var startTouchX = 0, startTouchY = 0;
    var isGesture = false;
    var lastTap = 0;

    function updateTransform() {
      img.style.transform = "translate(" + posX + "px, " + posY + "px) scale(" + scale + ")";
    }

    document.body.addEventListener("touchstart", function(e) {
      activeTouch = true;
      if (e.touches.length === 2) {
        isPinching = true;
        initDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        initMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        initMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        baseScale = scale;
        basePosX = posX;
        basePosY = posY;
      } else if (e.touches.length === 1) {
        isPinching = false;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        basePosX = posX;
        basePosY = posY;
        
        touchStartTime = Date.now();
        startTouchX = e.touches[0].clientX;
        startTouchY = e.touches[0].clientY;
        isGesture = false;
      }
    });

    document.body.addEventListener("touchmove", function(e) {
      if (!activeTouch) return;
      
      if (e.touches.length === 2 && isPinching) {
        e.preventDefault();
        var dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        
        var factor = dist / initDist;
        var newScale = baseScale * factor;
        if (newScale < 1) newScale = 1;
        if (newScale > 5) newScale = 5;
        
        // Midpoint-centered zoom formulas (for center-center origin)
        var newPosX = midX - window.innerWidth / 2 - (newScale / baseScale) * (initMidX - window.innerWidth / 2 - basePosX);
        var newPosY = midY - window.innerHeight / 2 - (newScale / baseScale) * (initMidY - window.innerHeight / 2 - basePosY);
        
        // Bound panning
        var maxPanX = (newScale - 1) * window.innerWidth / 2;
        var maxPanY = (newScale - 1) * window.innerHeight / 2;
        
        posX = Math.min(maxPanX, Math.max(-maxPanX, newPosX));
        posY = Math.min(maxPanY, Math.max(-maxPanY, newPosY));
        scale = newScale;
        updateTransform();
      } else if (e.touches.length === 1) {
        var dx = e.touches[0].clientX - startTouchX;
        var dy = e.touches[0].clientY - startTouchY;
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
          isGesture = true;
        }
        
        if (scale > 1) {
          e.preventDefault();
          var currentX = e.touches[0].clientX;
          var currentY = e.touches[0].clientY;
          
          var newPosX = basePosX + (currentX - startX);
          var newPosY = basePosY + (currentY - startY);
          
          var maxPanX = (scale - 1) * window.innerWidth / 2;
          var maxPanY = (scale - 1) * window.innerHeight / 2;
          
          posX = Math.min(maxPanX, Math.max(-maxPanX, newPosX));
          posY = Math.min(maxPanY, Math.max(-maxPanY, newPosY));
          updateTransform();
        }
      }
    });

    document.body.addEventListener("touchend", function(e) {
      if (e.touches.length === 0) {
        activeTouch = false;
        isPinching = false;
        
        // Double-tap reset
        var currentTime = Date.now();
        var tapLength = currentTime - lastTap;
        if (tapLength < 300 && tapLength > 0 && !isGesture) {
          scale = 1;
          posX = 0;
          posY = 0;
          updateTransform();
          e.preventDefault();
        } else {
          // Tap check: if no gesture and short duration, toggle fullscreen
          if (!isGesture && (Date.now() - touchStartTime < 250)) {
            toggleFullscreen();
          }
        }
        lastTap = currentTime;
      } else if (e.touches.length === 1) {
        // Transition to panning without jumps
        isPinching = false;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        basePosX = posX;
        basePosY = posY;
      }
    });

    // DESKTOP EVENT LISTENERS

    // 1. Mouse Wheel Trackpad Zoom
    document.body.addEventListener("wheel", function(e) {
      if (e.ctrlKey) {
        e.preventDefault();
        var factor = 1 - e.deltaY * 0.01;
        var newScale = scale * factor;
        if (newScale < 1) newScale = 1;
        if (newScale > 5) newScale = 5;
        
        var mouseX = e.clientX;
        var mouseY = e.clientY;
        
        var newPosX = mouseX - window.innerWidth / 2 - (newScale / scale) * (mouseX - window.innerWidth / 2 - posX);
        var newPosY = mouseY - window.innerHeight / 2 - (newScale / scale) * (mouseY - window.innerHeight / 2 - posY);
        
        var maxPanX = (newScale - 1) * window.innerWidth / 2;
        var maxPanY = (newScale - 1) * window.innerHeight / 2;
        
        posX = Math.min(maxPanX, Math.max(-maxPanX, newPosX));
        posY = Math.min(maxPanY, Math.max(-maxPanY, newPosY));
        
        scale = newScale;
        updateTransform();
      }
    }, { passive: false });

    // 2. Mouse Click-and-Drag Panning
    var isMouseDown = false;
    var mouseStartX = 0, mouseStartY = 0;
    document.body.addEventListener("mousedown", function(e) {
      if (e.button !== 0 || e.target.closest("#fullscreen-btn")) return;
      isMouseDown = true;
      mouseStartX = e.clientX;
      mouseStartY = e.clientY;
      basePosX = posX;
      basePosY = posY;
      document.body.style.cursor = "grabbing";
    });

    document.body.addEventListener("mousemove", function(e) {
      if (!isMouseDown) return;
      if (scale > 1) {
        e.preventDefault();
        var dx = e.clientX - mouseStartX;
        var dy = e.clientY - mouseStartY;
        
        var newPosX = basePosX + dx;
        var newPosY = basePosY + dy;
        
        var maxPanX = (scale - 1) * window.innerWidth / 2;
        var maxPanY = (scale - 1) * window.innerHeight / 2;
        
        posX = Math.min(maxPanX, Math.max(-maxPanX, newPosX));
        posY = Math.min(maxPanY, Math.max(-maxPanY, newPosY));
        updateTransform();
      }
    });

    document.body.addEventListener("mouseup", function() {
      isMouseDown = false;
      document.body.style.cursor = "default";
    });
    document.body.addEventListener("mouseleave", function() {
      isMouseDown = false;
      document.body.style.cursor = "default";
    });

    function toggleFullscreen() {
      var isFullscreen = document.fullscreenElement || 
                         document.mozFullScreenElement || 
                         document.webkitFullscreenElement || 
                         document.msFullscreenElement;
                         
      if (isFullscreen) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      } else {
        var docElm = document.documentElement;
        if (docElm.requestFullscreen) {
          docElm.requestFullscreen();
        } else if (docElm.mozRequestFullScreen) {
          docElm.mozRequestFullScreen();
        } else if (docElm.webkitRequestFullscreen) {
          docElm.webkitRequestFullscreen();
        } else if (docElm.msRequestFullscreen) {
          docElm.msRequestFullscreen();
        }
      }
    }
  </script>
</body>
</html>
