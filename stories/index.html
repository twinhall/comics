<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wordless Picture Story</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="pdf-viewer" src=""></iframe>

  <script>
    // List of PDF stories
    var pdfs = ["buried_treasure.pdf", "genesis_1.pdf", "good_samaritan.pdf", "good_samaritan_hijra.pdf", "hingsha.pdf", "prodigal_son.pdf", "ruth_in_bd.pdf", "the_flower_man.pdf"];

    // Select a random PDF
    var randomPdf = pdfs[Math.floor(Math.random() * pdfs.length)];
    
    // Detect iOS to use native rendering, otherwise fallback to Google Docs Viewer
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    
    if (isIOS) {
      // iOS can render PDF inline in iframe natively
      document.getElementById("pdf-viewer").src = randomPdf;
    } else {
      // Android / others require a viewer
      var pdfUrl = "https://twinhall.github.io/comics/stories/" + randomPdf;
      document.getElementById("pdf-viewer").src = "https://docs.google.com/viewer?url=" + encodeURIComponent(pdfUrl) + "&embedded=true";
    }
  </script>
</body>
</html>
